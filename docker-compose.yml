services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       relayhub
      POSTGRES_USER:     relayhub
      POSTGRES_PASSWORD: relayhub_secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"         # Expose locally for psql/TablePlus inspection
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U relayhub -d relayhub"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── RelayHub API ────────────────────────────────────────────────────────────
  app:
    build: .
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      PORT:               "8080"
      DATABASE_URL:       "postgres://relayhub:relayhub_secret@postgres:5432/relayhub?sslmode=disable"
      RESEND_API_KEY:     "${RESEND_API_KEY}"
      FROM_EMAIL:         "${FROM_EMAIL}"
      DISCORD_WEBHOOK_URL: "${DISCORD_WEBHOOK_URL}"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
